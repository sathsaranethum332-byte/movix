<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieFlix</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#0b0b0b;color:white;}

nav{
margin-top:-60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:black;
position:fixed;
width:100%;
z-index:100;
}

.logo{font-size:22px;font-weight:700;color:red}

#searchInput{
padding:7px 12px;
width:50%;
border-radius:5px;
border:none;
outline:none;
}

.profile{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
display:none;
}

.profile img{
width:35px;
height:35px;
border-radius:50%;
border:2px solid red;
}

.login-btn{
background:red;
border:none;
padding:8px 14px;
color:white;
cursor:pointer;
border-radius:10px;
box-shadow:0 0 10px #aaa;
}

#logoutBtn{
display:none;
margin-left:10px;
padding:5px 10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

/* WELCOME POPUP */

#welcomePopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px 25px;
border-radius:10px;
display:none;
align-items:center;
gap:10px;
box-shadow:0 0 15px black;
z-index:1000;
}

#welcomePopup img{
width:40px;
height:40px;
border-radius:50%;
}

/* BANNER */

.banner{
margin-top:60px;
height:65vh;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:space-between;
padding:50px;
transition:0.5s;
color:white;
position:relative;
}

.banner h1{font-size:40px}

.banner button{
margin-top:15px;
padding:10px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
border-radius:20px;
}

.banner-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

/* ROW */

.row{padding:20px}

.row h2{margin-bottom:10px}

.slider{
display:flex;
overflow-x:auto;
gap:12px;
}

.slider::-webkit-scrollbar{display:none}

/* MOVIE CARD */

.movie-card{
min-width:180px;
background:#111;
border-radius:8px;
overflow:hidden;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.movie-card img{
width:100%;
height:270px;
object-fit:cover;
}

.movie-card h3{
font-size:16px;
padding:5px;
color:white;
}

.movie-info{
padding:5px;
color:#ffd700;
font-size:14px;
}

.movie-buttons{
display:flex;
justify-content:center;
padding:10px;
}

.movie-buttons button{
padding:5px 10px;
border:none;
cursor:pointer;
border-radius:10px;
color:white;
background:red;
}

.movie-card:hover{transform:scale(1.05)}

/* PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:500;
}

.player iframe{
width:80%;
height:80%;
border:none;
}

.close-player{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
color:white;
}

</style>
</head>

<body>

<!-- WELCOME POPUP -->

<div id="welcomePopup">
<img id="welcomePhoto">
<span id="welcomeText"></span>
</div>

<nav>

<div style="display:flex; align-items:center; gap:15px;">
<div class="logo">MOVIX</div>
<input type="text" id="searchInput" placeholder="Search movies...">
</div>

<div id="loginArea">
<button class="login-btn" id="loginBtn">LOGIN MOVIX</button>
</div>

<div class="profile" id="profile">
<img id="userPhoto">
<button id="logoutBtn">Logout</button>
</div>

</nav>

<div class="banner" id="banner">
<div class="banner-overlay"></div>

<div style="position:relative; z-index:10;">
<h1 id="bannerTitle">Avatar</h1>
<button id="bannerWatchBtn">Watch</button>
</div>

</div>

<div class="row">
<h2>Trending</h2>
<div class="slider" id="trending"></div>
</div>

<!-- PLAYER -->

<div class="player" id="player">
<div class="close-player" onclick="closePlayer()">✖</div>
<iframe id="playerFrame"></iframe>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyDrvl5wvpsfxaMbWkZjBo9n38RZbwChdng",
authDomain:"cadet-team-kcc.firebaseapp.com",
projectId:"cadet-team-kcc",
storageBucket:"cadet-team-kcc.appspot.com",
messagingSenderId:"418568958796",
appId:"1:418568958796:web:f62eb7e555b226e45315e9"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth();
const provider=new GoogleAuthProvider();

async function login(){

if(/Mobi|Android/i.test(navigator.userAgent)){
await signInWithRedirect(auth,provider)
}else{

try{
const result=await signInWithPopup(auth,provider)
handleUser(result.user)

}catch(e){
alert("Login failed")
}

}

}

document.getElementById("loginBtn").addEventListener("click",login)

function handleUser(user){

if(user){

document.getElementById("loginArea").style.display="none"
document.getElementById("profile").style.display="flex"
document.getElementById("userPhoto").src=user.photoURL

showWelcome(user)

}else{

document.getElementById("loginArea").style.display="block"
document.getElementById("profile").style.display="none"

}

}

function showWelcome(user){

const popup=document.getElementById("welcomePopup")

document.getElementById("welcomePhoto").src=user.photoURL
document.getElementById("welcomeText").innerText="Hi "+user.displayName

popup.style.display="flex"

setTimeout(()=>{
popup.style.display="none"
},2000)

}

onAuthStateChanged(auth,handleUser)

getRedirectResult(auth).then(result=>{
if(result?.user){
handleUser(result.user)
}
})

document.getElementById("logoutBtn").onclick=async()=>{
await signOut(auth)
location.reload()
}

/* MOVIES */

const movies=[
{
title:"Avatar",
img:"https://image.tmdb.org/t/p/w500/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg",
watchLink:"https://example.com"
},
{
title:"Inception",
img:"https://image.tmdb.org/t/p/w500/qmDpIHrmpJINaRKAfWQfftjCdyi.jpg",
watchLink:"https://example.com"
}
]

function loadMovies(){

const container=document.getElementById("trending")

movies.forEach(m=>{

const card=document.createElement("div")
card.className="movie-card"

card.innerHTML=`
<img src="${m.img}">
<h3>${m.title}</h3>
<div class="movie-buttons">
<button onclick="playMovie('${m.watchLink}')">Watch</button>
</div>
`

container.appendChild(card)

})

}

loadMovies()

window.playMovie=function(link){

document.getElementById("player").style.display="flex"
document.getElementById("playerFrame").src=link

}

window.closePlayer=function(){

document.getElementById("player").style.display="none"
document.getElementById("playerFrame").src=""

}

</script>

</body>
</html>
