<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVIX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#0b0b0b;color:white;}

/* NAVBAR */
nav{
  margin-top:-70px;
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 30px;background:black;position:fixed;width:100%;z-index:100;
}
.logo{font-size:22px;font-weight:700;color:red;}
#searchInput{

  padding:5px 20px;border-radius:5px;border:none;width:200px;outline:none;font-size:14px;
}
.profile{display:none;align-items:center;gap:10px;cursor:pointer;position:relative;}
.profile img{width:35px;height:35px;border-radius:50%;border:2px solid red;}

/* SIDEBAR */
#profileSidebar{
  position:fixed;top:0;right:-220px;width:220px;height:100vh;background:#111;
  transition:0.3s;z-index:300;padding:20px;display:flex;flex-direction:column;gap:15px;
}
#profileSidebar.show{right:0;}
#profileSidebar img{width:70px;height:70px;border-radius:50%;margin:auto;}
#profileSidebar button{padding:8px 10px;border:none;background:red;color:white;border-radius:5px;cursor:pointer;}

/* LOGIN POPUP */
#loginPopup{
  position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(0,0,0,0.7);
  display:flex;justify-content:center;align-items:center;z-index:500;
}
#loginPopup .card{
  background:#111;padding:30px;border-radius:10px;display:flex;flex-direction:column;gap:20px;width:300px;text-align:center;
}
#loginPopup .card button{
  padding:10px 0;border:none;border-radius:8px;cursor:pointer;font-weight:600;
}
#loginPopup .google{background:#db4437;color:white;}
#loginPopup .facebook{background:#3b5998;color:white;}
#loginPopup .closePopup{position:absolute;top:20px;right:30px;font-size:25px;color:white;cursor:pointer;}

/* BANNER */
.banner{margin-top:70px;height:65vh;background-size:cover;background-position:center;display:flex;align-items:center;padding:50px;position:relative;transition:0.5s;color:white;}
.banner-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);}
.banner h1{font-size:40px;}
.banner button{margin-top:15px;padding:10px 20px;background:red;border:none;color:white;cursor:pointer;border-radius:20px;}

/* ROW */
.row{padding:20px;}
.row h2{margin-bottom:10px;cursor:pointer;}
.slider{display:flex;overflow-x:auto;gap:12px;}
.slider::-webkit-scrollbar{display:none;}
.movie-card{min-width:180px;background:#111;border-radius:8px;overflow:hidden;text-align:center;transition:0.3s;cursor:pointer;}
.movie-card img{width:100%;height:270px;object-fit:cover;}
.movie-card h3{font-size:16px;padding:5px;}
.movie-info{padding:5px;color:#ffd700;font-size:14px;}
.movie-buttons{display:flex;justify-content:center;padding:10px;}
.movie-buttons button{padding:6px 12px;border:none;background:red;color:white;border-radius:10px;cursor:pointer;}
.movie-card:hover{transform:scale(1.05);}

/* PLAYER */
.player{position:fixed;top:0;left:0;width:100%;height:100vh;background:black;display:none;justify-content:center;align-items:center;z-index:500;}
.player iframe{width:80%;height:80%;border:none;}
.close-player{position:absolute;top:20px;right:30px;font-size:30px;cursor:pointer;color:white;}

/* ALL MOVIES */
#allMoviesPage{display:none;padding:20px;margin-top:60px;}
#allMoviesList{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
</style>
</head>
<body>

<nav>
  <div class="logo">MOVIX</div>
  <input type="text" id="searchInput" placeholder="Search movies...">
  <div class="profile" id="profile">
    <img id="userPhoto">
  </div>
</nav>

<!-- SIDEBAR -->
<div id="profileSidebar">
  <img id="sidebarPhoto">
  <button id="sidebarLogoutBtn">Logout</button>
</div>

<!-- LOGIN POPUP -->
<div id="loginPopup">
  <div class="closePopup" onclick="closeLoginPopup()">✖</div>
  <div class="card">
    <h2>Login to MOVIX</h2>
    <button class="google" id="googleLoginBtn">Login with Google</button>
    <button class="facebook">Login with Facebook</button>
  </div>
</div>

<!-- BANNER -->
<div class="banner" id="banner">
  <div class="banner-overlay"></div>
  <div style="position:relative;z-index:5;">
    <h1 id="bannerTitle">Avatar</h1>
    <button id="bannerWatchBtn">Watch</button>
    <button onclick="openAllMovies()">All Movies</button>
  </div>
</div>

<!-- MOVIE ROWS -->
<div class="row"><h2>Trending</h2><div class="slider" id="trending"></div></div>
<div class="row"><h2>New Movies</h2><div class="slider" id="new"></div></div>
<div class="row"><h2>Recommended</h2><div class="slider" id="recommended"></div></div>

<!-- ALL MOVIES PAGE -->
<div id="allMoviesPage"><h2>All Movies</h2><div id="allMoviesList"></div></div>

<!-- PLAYER -->
<div class="player" id="player"><div class="close-player" onclick="closePlayer()">✖</div><iframe id="playerFrame"></iframe></div>

    card.innerHTML=`<img src="${m.img}" alt="${m.title}"><h3>${m.title}</h3><div class="movie-info">⭐ ${m.stars}</div><div class="movie-buttons"><button onclick="playMovie('${m.link}')">Watch</button></div>`;
    container.appendChild(card);
  });
}
loadMovies(trendingMovies,"trending");
loadMovies(newMovies,"new");
loadMovies(recommendedMovies,"recommended");

// BANNER SLIDER
let bannerIndex=0;
function setBanner(movie){
  document.getElementById("banner").style.backgroundImage=`url('${movie.img}')`;
  document.getElementById("bannerTitle").innerText=movie.title;
  document.getElementById("bannerWatchBtn").onclick=()=>playMovie(movie.link);
}
setBanner(trendingMovies[0]);
setInterval(()=>{bannerIndex=(bannerIndex+1)%trendingMovies.length;setBanner(trendingMovies[bannerIndex]);},4000);

// ALL MOVIES PAGE
function openAllMovies(){
  const page=document.getElementById("allMoviesPage"); page.style.display="block";
  const list=document.getElementById("allMoviesList"); list.innerHTML="";
  allMovies.forEach(m=>{
    const card=document.createElement("div"); card.className="movie-card";
    card.innerHTML=`<img src="${m.img}" alt="${m.title}"><h3>${m.title}</h3><div class="movie-info">⭐ ${m.stars}</div><div class="movie-buttons"><button onclick="playMovie('${m.link}')">Watch</button></div>`;
    list.appendChild(card);
  });
  window.scrollTo({top:0,behavior:"smooth"});
}

// PLAYER
window.playMovie=function(link){document.getElementById("player").style.display="flex"; document.getElementById("playerFrame").src=link;}
window.closePlayer=function(){document.getElementById("player").style.display="none"; document.getElementById("playerFrame").src="";}

// LOGIN POPUP
const loginPopup=document.getElementById("loginPopup");
function closeLoginPopup(){loginPopup.style.display="none";}

// GOOGLE LOGIN
document.getElementById("googleLoginBtn").onclick=async function(){
  try{
    const result=await signInWithPopup(auth,provider);
    const user=result.user;
    document.getElementById("userPhoto").src=user.photoURL;
    document.getElementById("sidebarPhoto").src=user.photoURL;
    document.querySelector(".profile").style.display="flex";
    loginPopup.style.display="none";
  } catch(err){console.error(err);}
}

// SIDEBAR OPEN/CLOSE
const sidebar=document.getElementById("profileSidebar");
document.getElementById("profile").onclick=function(e){
  e.stopPropagation();
  sidebar.classList.toggle("show");
}
document.getElementById("sidebarLogoutBtn").onclick=async function(){await signOut(auth); location.reload();}
// Close sidebar on outside click
document.addEventListener("click",function(e){
  if(sidebar.classList.contains("show") && !sidebar.contains(e.target) && e.target.id!=="profile"){
    sidebar.classList.remove("show");
  }
});

// SEARCH
document.getElementById("searchInput").addEventListener("input",function(){
  const filter=this.value.toLowerCase();
  document.querySelectorAll(".movie-card").forEach(card=>{
    const title=card.querySelector("h3").innerText.toLowerCase();
    card.style.display=title.includes(filter)?"inline-block":"none";
  });
});

// AUTO SHOW LOGIN POPUP & PROFILE PHOTO ON RELOAD
window.addEventListener("load", function(){
  if(!localStorage.getItem("loggedIn")) loginPopup.style.display="flex";
  onAuthStateChanged(auth, user => {
    if(user){
      localStorage.setItem("loggedIn","true");
      loginPopup.style.display="none";
      // Show profile photo after reload
      document.querySelector(".profile").style.display = "flex";
      document.getElementById("userPhoto").src = user.photoURL;
      document.getElementById("sidebarPhoto").src = user.photoURL;
    }
  });
});
</script>
</body>
</html>
