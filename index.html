<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVIX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: #0f0f0f;
  color: #fff;
}
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background: linear-gradient(90deg,#ff0000,#000);
}
header h1 { margin:0; font-weight:700; }
#profile { display:flex; align-items:center; gap:10px; }
#profile img { width:40px; border-radius: 10PX; border: 5px solid (#ff0000;) }
button { background:#ff0000; border:none; color:#fff; padding:5px 10px; cursor:pointer; border-radius:5px; font-weight: 700; }
main { padding:20px; display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
.movie-card { background:#1a1a1a; border-radius:5px; overflow:hidden; text-align:center;  cursor:pointer; }
.movie-card:hover { background: #3d3d3d; }
.movie-card img { width:100%; height:300px; object-fit:cover; }
.movie-card h3 { margin:10px 0 5px; font-size:18px; }
.movie-card p { margin:0 0 10px; font-size:14px; color:#ccc; }
#searchBar { margin:20px 0; display:flex; gap:10px; flex-wrap:wrap; }
#searchBar input, #searchBar select { padding:5px 10px; border-radius:5px; border:none; }
#loginBtn { background:#ff0000; border:none; color:#fff; padding:10px 15px; cursor:pointer; border-radius:5px; font-weight:600; }
#movieCounter { padding:10px 20px; font-weight:600; color:#ff0000; }

/* Movie Popup */
#moviePopup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:1000;
}
#moviePopupContent {
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:600px;
  max-height:90%;
  overflow:auto;
  position:relative;
}
#moviePopupContent img { width:100%; height:auto; border-radius:10px; margin-bottom:10px; }
#closePopup { position:absolute; top:10px; right:10px; background:#ff0000; border:none; color:#fff; padding:5px 10px; cursor:pointer; border-radius:5px; }


main {
  padding:10px;
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

/* Mobile screens (max-width: 768px) */
@media screen and (max-width:768px){
  main {
    grid-template-columns: repeat(3,1fr);
  }
  .movie-card img {
    height: 200px; /* smaller height for mobile */
  }
}

/* Extra small screens (max-width: 480px) */
@media screen and (max-width:480px){
  main {
    grid-template-columns: repeat(2,1fr); /* 2 per row for small phones */
  }
  .movie-card img {
    height: 180px;
  }
}


</style>
</head>
<body>

<header>
  <h1>MOVIX</h1>
  <div id="profile" style="display:none;">
    <span id="userName"></span>
    <img id="userPhoto" src="" alt="profile">
    <button id="logoutBtn">Logout</button>
  </div>
  <button id="loginBtn">Login with Google</button>
</header>

<div id="searchBar" style="display:none;">
  <input type="text" id="searchInput" placeholder="Search movies...">
  <select id="genreSelect"><option value="">All Genres</option></select>
  <select id="yearSelect"><option value="">All Years</option></select>
</div>

<div id="movieCounter"></div>
<main id="movieContainer"></main>

<!-- Movie Popup -->
<div id="moviePopup">
  <div id="moviePopupContent">
    <button id="closePopup">Close</button>
    <img id="popupImage" src="">
    <h2 id="popupTitle"></h2>
    <p id="popupOverview"></p>
    <p id="popupRating"></p>
    <a id="popupTrailer" href="#" target="_blank" style="color:#ff0000;">Watch Trailer</a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyD3SPv3wB-sj0SEno5LUY-cMNDOJXshtvo",
  authDomain: "movix-b29a9.firebaseapp.com",
  projectId: "movix-b29a9",
  storageBucket: "movix-b29a9.firebasestorage.app",
  messagingSenderId: "280489431191",
  appId: "1:280489431191:web:80b836ed3c24136d7e99d2",
  measurementId: "G-GM3NMXZ717"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const movieContainer = document.getElementById("movieContainer");
const searchInput = document.getElementById("searchInput");
const genreSelect = document.getElementById("genreSelect");
const yearSelect = document.getElementById("yearSelect");
const userName = document.getElementById("userName");
const userPhoto = document.getElementById("userPhoto");
const logoutBtn = document.getElementById("logoutBtn");
const profileDiv = document.getElementById("profile");
const loginBtn = document.getElementById("loginBtn");
const searchBar = document.getElementById("searchBar");
const movieCounter = document.getElementById("movieCounter");

const moviePopup = document.getElementById("moviePopup");
const popupImage = document.getElementById("popupImage");
const popupTitle = document.getElementById("popupTitle");
const popupOverview = document.getElementById("popupOverview");
const popupRating = document.getElementById("popupRating");
const popupTrailer = document.getElementById("popupTrailer");
const closePopup = document.getElementById("closePopup");

const TMDB_KEY = "e694a8c2eaa4e397ddd617df9896370f";
const TMDB_URL = "https://api.themoviedb.org/3";

let allMovies = [];
let totalPages = 500;
let currentPage = 1;
const moviesPerPage = 30;

// Auth
auth.onAuthStateChanged(user => {
  if(user){
    loginBtn.style.display = "none";
    profileDiv.style.display = "flex";
    searchBar.style.display = "flex";
    userName.textContent = user.displayName || user.email;
    userPhoto.src = user.photoURL || "https://i.imgur.com/8Km9tLL.png";
    loadGenres();
    populateYears();
    loadAllMovies();
  } else {
    loginBtn.style.display = "inline-block";
    profileDiv.style.display = "none";
    searchBar.style.display = "none";
    movieContainer.innerHTML = "";
    movieCounter.textContent = "";
  }
});

loginBtn.addEventListener("click", () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(console.error);
});
logoutBtn.addEventListener("click", () => auth.signOut());

// Genres
async function loadGenres(){
  const res = await fetch(`${TMDB_URL}/genre/movie/list?api_key=${TMDB_KEY}&language=en-US`);
  const data = await res.json();
  data.genres.forEach(g=>{
    const option = document.createElement("option");
    option.value = g.id;
    option.textContent = g.name;
    genreSelect.appendChild(option);
  });
}

// Years
function populateYears(){
  const year = new Date().getFullYear();
  for(let i=year;i>=year-50;i--){
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i;
    yearSelect.appendChild(option);
  }
}

// Load 1000 movies
async function loadAllMovies(){
  movieContainer.innerHTML="Loading movies...";
  allMovies = [];
  for(let page=1; page<=totalPages; page++){
    const res = await fetch(`${TMDB_URL}/movie/popular?api_key=${TMDB_KEY}&language=en-US&page=${page}`);
    const data = await res.json();
    allMovies.push(...data.results);
  }
  currentPage = 1;
  displayMovies(allMovies);
}

// Display Movies with Pagination
function displayMovies(movies){
  movieContainer.innerHTML="";
  const start = (currentPage-1)*moviesPerPage;
  const end = start+moviesPerPage;
  const paginatedMovies = movies.slice(start, end);

  paginatedMovies.forEach(movie=>{
    const card = document.createElement("div");
    card.className="movie-card";
    card.innerHTML=`
      <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}">
      <h3>${movie.title}</h3>
      <p>${movie.release_date ? movie.release_date.split('-')[0] : ''}</p>
      <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
        <a href="https://www.themoviedb.org/movie/${movie.id}" target="_blank">
          <button>Watch</button>
        </a>
        <a href="https://www.profitablecpmratenetwork.com/cvatc3nq?key=2478ac76679544a55f29fe2a3442c815" target="_blank">
          <button>Download</button>
        </a>
      </div>
    `;
    card.addEventListener("click", ()=> showMoviePopup(movie.id));
    movieContainer.appendChild(card);
  });

  movieCounter.textContent = `Showing ${start+1}-${Math.min(end,movies.length)} of ${movies.length} movies`;

  // Pagination Buttons
  const pagination = document.createElement("div");
  pagination.style.display="flex";
  pagination.style.justifyContent="center";
  pagination.style.gap="20px";
  pagination.style.margin="20px 0";

  const prevBtn = document.createElement("button");
  prevBtn.textContent="Previous";
  prevBtn.disabled = currentPage === 1;
  prevBtn.onclick = ()=>{
    currentPage--;
    displayMovies(movies);
  };

  const nextBtn = document.createElement("button");
  nextBtn.textContent="Next";
  nextBtn.disabled = end >= movies.length;
  nextBtn.onclick = ()=>{
    currentPage++;
    displayMovies(movies);
  };

  pagination.appendChild(prevBtn);
  pagination.appendChild(nextBtn);
  movieContainer.appendChild(pagination);
}

// Search & Filter
function filterMovies(){
  const query = searchInput.value.toLowerCase();
  const genre = genreSelect.value;
  const year = yearSelect.value;
  const filtered = allMovies.filter(m=>{
    let match = true;
    if(query) match = match && m.title.toLowerCase().includes(query);
    if(genre) match = match && m.genre_ids.includes(parseInt(genre));
    if(year) match = match && m.release_date && m.release_date.startsWith(year);
    return match;
  });
  currentPage = 1;
  displayMovies(filtered);
}

searchInput.addEventListener("input", filterMovies);
genreSelect.addEventListener("change", filterMovies);
yearSelect.addEventListener("change", filterMovies);

// Movie Popup
async function showMoviePopup(id){
  const res = await fetch(`${TMDB_URL}/movie/${id}?api_key=${TMDB_KEY}&language=en-US&append_to_response=videos`);
  const movie = await res.json();
  popupImage.src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
  popupTitle.textContent = movie.title;
  popupOverview.textContent = movie.overview;
  popupRating.textContent = `Rating: ${movie.vote_average} / 10`;
  const trailer = movie.videos.results.find(v=>v.type==="Trailer" && v.site==="YouTube");
  popupTrailer.href = trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : "#";
  moviePopup.style.display="flex";
}

closePopup.addEventListener("click", ()=> moviePopup.style.display="none");
moviePopup.addEventListener("click", e=>{ if(e.target===moviePopup) moviePopup.style.display="none"; });
</script>
</body>
</html>
